---
layout: default
post: true
---
<article>
	<header>
		<h1><a href="{{ page.url }}">{{ page.title }}</a></h1>
		<p class="post-meta">
			{% if page.tags %}
				<span class="tags">
				{% for tag in page.tags %}
					<a class="tag" href="/tags/#{{ tag | slugify }}">{{ tag }}</a>
				{% endfor %}
				</span>
			{% endif %}
		</p>
	</header>

	<div class="prose">
		{{ content }}
	</div>

	<footer>
		<p class="well">{{ page.date | date_to_long_string }}</p>
	</footer>
</article>
