<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="color-scheme" content="light dark">

	{% seo %}

	<link href="/css/custom.css" rel="stylesheet">

	<link rel="icon" href="/favicon.ico" sizes="any">
	<link rel="icon" type="image/svg+xml" href="/favicon.svg">
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
	<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
	<link rel="manifest" href="/site.webmanifest">
	<meta name="theme-color" content="#0d0f0d">
</head>
<body{% if page.layout == "post" %} class="post-page"{% endif %}>
	<div class="container-narrow">
		<header class="masthead">
			<a class="brand" href="/">-12th-ln-&gt;<span class="caret"></span></a>
			<nav class="nav">
				<a href="/"{% if page.url == "/" %} class="active"{% endif %}><span class="label">home</span></a>
				<a href="/blog"{% if page.url == "/blog" or page.path contains '_posts' %} class="active"{% endif %}><span class="label">blog</span></a>
				<a href="/about"{% if page.url == "/about" %} class="active"{% endif %}><span class="label">about</span></a>
			</nav>
		</header>

		<main>
			{{ content }}
		</main>

		<footer class="footer">
			<span class="prompt">$</span> &copy; 2026 Alexander Ivanov &middot; built with <a href="https://jekyllrb.com" rel="nofollow">Jekyll</a>
		</footer>
	</div>
</body>
</html>
